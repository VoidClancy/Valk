name: validate

on:
  push:
    branches-ignore:
    - 'main'
    - 'master'
  pull_request:
    branches-ignore:
    - 'main'
    - 'master'

jobs:
  check-and-test:
    name: Check, Build, and Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true
        cache-dependency-path: '**/go.sum'

    - name: Vet packages
      run: make vet

    - name: Run compiler unit tests
      run: make test
